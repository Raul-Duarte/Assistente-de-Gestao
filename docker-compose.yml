name: assistente_gestao

services:
  db:
    container_name: assistente_gestao_db
    image: postgres:16-alpine
    restart: unless-stopped
    labels:
      app.role: database
      app.description: "Banco PostgreSQL da aplicação Assistente de Gestão"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assistente_gestao}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - assistente_gestao_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-assistente_gestao}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  back:
    container_name: assistente_gestao_back
    build:
      context: .
      target: runtime
    restart: unless-stopped
    labels:
      app.role: backend
      app.description: "API Node.js/Express com autenticação e regras de negócio"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      SERVE_STATIC: "false"
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-assistente_gestao}
      SESSION_SECRET: ${SESSION_SECRET:-local-dev-session-secret}
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-7}
      AUTH_LOCAL_EMAIL: ${AUTH_LOCAL_EMAIL:-admin@local.dev}
      AUTH_LOCAL_PASSWORD: ${AUTH_LOCAL_PASSWORD:-admin123}
      AUTH_LOCAL_FIRST_NAME: ${AUTH_LOCAL_FIRST_NAME:-Admin}
      AUTH_LOCAL_LAST_NAME: ${AUTH_LOCAL_LAST_NAME:-Local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_DEBUG_LOGS: ${OPENAI_DEBUG_LOGS:-false}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  front:
    container_name: assistente_gestao_front
    build:
      context: .
      dockerfile: Dockerfile.front
    restart: unless-stopped
    labels:
      app.role: frontend
      app.description: "Frontend React estático em Nginx com proxy de /api para backend"
    depends_on:
      back:
        condition: service_healthy
    ports:
      - "${FRONT_PORT:-5001}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  migrate:
    profiles: ["migrate"]
    build:
      context: .
      target: build
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-assistente_gestao}
    command: ["npm", "run", "db:push"]

volumes:
  assistente_gestao_db_data:
